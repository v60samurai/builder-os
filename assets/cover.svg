  <text x="834" y="557"
    font-family="'Playfair Display', Georgia, serif"
    font-size="13"
    font-style="italic"
    fill="#1a1208"
    opacity="0.65">you've shipped at least once.</text>

  <!-- ── FOOTER RULE + COLOPHON ── -->
  <rect x="40" y="574" width="1200" height="2.5" fill="#1a1208"/>
  <rect x="40" y="580" width="1200" height="0.8" fill="#1a1208"/>

  <text x="640" y="596"
    font-family="'Source Serif 4', Georgia, serif"
