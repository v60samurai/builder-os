<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,900;1,400;1,700&amp;family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&amp;display=swap');
    </style>

    <!-- Paper texture: subtle noise via feTurbulence -->
    <filter id="paper" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Ink bleed: very subtle blur on dark text -->
    <filter id="inkbleed">
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>

    <!-- Aged paper gradient: slightly darker at edges -->
    <radialGradient id="paperGrad" cx="50%" cy="50%" r="72%">
      <stop offset="0%" style="stop-color:#f0e8d0"/>
      <stop offset="100%" style="stop-color:#d4c89a"/>
    </radialGradient>

    <!-- Column rule gradient: fades at top/bottom -->
    <linearGradient id="ruleV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1208;stop-opacity:0"/>
      <stop offset="12%" style="stop-color:#1a1208;stop-opacity:0.6"/>
      <stop offset="88%" style="stop-color:#1a1208;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#1a1208;stop-opacity:0"/>
    </linearGradient>

    <!-- Horizontal rule gradient -->
    <linearGradient id="ruleH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1208;stop-opacity:0"/>
      <stop offset="4%" style="stop-color:#1a1208;stop-opacity:0.7"/>
      <stop offset="96%" style="stop-color:#1a1208;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#1a1208;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- ── PAPER BASE ── -->
  <rect width="1280" height="640" fill="url(#paperGrad)"/>
  <!-- Texture overlay -->
  <rect width="1280" height="640" fill="url(#paperGrad)" filter="url(#paper)" opacity="0.4"/>

  <!-- ── OUTER BORDER: thick ink frame ── -->
  <rect x="32" y="28" width="1216" height="584" fill="none" stroke="#1a1208" stroke-width="3"/>
  <!-- Inner thin border -->
  <rect x="40" y="36" width="1200" height="568" fill="none" stroke="#1a1208" stroke-width="0.8"/>

  <!-- ── MASTHEAD AREA ── -->
  <!-- Top rule, heavy -->
  <rect x="40" y="36" width="1200" height="5" fill="#1a1208"/>

  <!-- NAMEPLATE: Builder OS -->
  <text
    x="640" y="110"
    font-family="'Playfair Display', 'Times New Roman', Georgia, serif"
    font-size="82"
    font-weight="900"
    fill="#1a1208"
    text-anchor="middle"
    letter-spacing="12"
    filter="url(#inkbleed)">BUILDER OS</text>

  <!-- Masthead rule, medium -->
  <rect x="40" y="122" width="1200" height="2.5" fill="#1a1208"/>
  <!-- Thin rule below -->
  <rect x="40" y="128" width="1200" height="0.8" fill="#1a1208"/>

  <!-- ── DATELINE ROW ── -->
  <!-- Left: Edition info -->
  <text x="52" y="148"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11"
    fill="#1a1208"
    letter-spacing="1.5">VOL. I — NO. 1</text>

  <!-- Center: tagline -->
  <text x="640" y="148"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11"
    font-style="italic"
    fill="#1a1208"
    text-anchor="middle"
    letter-spacing="0.5">An Operating System for Shipping Products Solo With AI</text>

  <!-- Right: MIT / free -->
  <text x="1228" y="148"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11"
    fill="#1a1208"
    text-anchor="end"
    letter-spacing="1.5">MIT LICENSE — FREE</text>

  <!-- Rule below dateline -->
  <rect x="40" y="155" width="1200" height="0.8" fill="#1a1208"/>
  <rect x="40" y="158" width="1200" height="2.5" fill="#1a1208"/>

  <!-- ── MAIN CONTENT AREA ── -->
  <!-- Vertical column rules — splitting into 3 columns roughly -->
  <!-- Left column rule at x=460 -->
  <rect x="460" y="170" width="0.8" height="430" fill="url(#ruleV)"/>
  <!-- Right column rule at x=820 -->
  <rect x="820" y="170" width="0.8" height="430" fill="url(#ruleV)"/>

  <!-- ── LEFT COLUMN: Primary story headline ── -->

  <!-- Kicker label -->
  <text x="52" y="194"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10"
    fill="#1a1208"
    letter-spacing="3"
    font-weight="600">OPINION</text>
  <rect x="52" y="198" width="396" height="0.6" fill="#1a1208"/>

  <!-- MEGA HEADLINE -->
  <text x="52" y="272"
    font-family="'Playfair Display', Georgia, serif"
    font-size="72"
    font-weight="900"
    fill="#1a1208"
    letter-spacing="-1"
    filter="url(#inkbleed)">Most</text>

  <text x="52" y="348"
    font-family="'Playfair Display', Georgia, serif"
    font-size="72"
    font-weight="900"
    fill="#1a1208"
    letter-spacing="-1"
    filter="url(#inkbleed)">templates</text>

  <text x="52" y="424"
    font-family="'Playfair Display', Georgia, serif"
    font-size="72"
    font-weight="900"
    fill="#1a1208"
    letter-spacing="-1"
    filter="url(#inkbleed)">are slop.</text>

  <!-- Deck text -->
  <text x="52" y="456"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="14"
    font-style="italic"
    fill="#1a1208"
    opacity="0.75">These aren't.</text>

  <!-- Byline -->
  <rect x="52" y="466" width="396" height="0.6" fill="#1a1208"/>
  <text x="52" y="482"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10.5"
    fill="#1a1208"
    letter-spacing="0.5">By <tspan font-style="italic">Harshit Badiger</tspan>   ·   @v60samurai</text>

  <!-- ── MIDDLE COLUMN: Pull quote + mini stories ── -->

  <!-- Kicker -->
  <text x="474" y="194"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10"
    fill="#1a1208"
    letter-spacing="3"
    font-weight="600">WHAT'S INSIDE</text>
  <rect x="474" y="198" width="334" height="0.6" fill="#1a1208"/>

  <!-- Pull quote: large italic -->
  <text x="640" y="250"
    font-family="'Playfair Display', Georgia, serif"
    font-size="17"
    font-style="italic"
    fill="#1a1208"
    text-anchor="middle"
    font-weight="400">"Every section tells you</text>
  <text x="640" y="272"
    font-family="'Playfair Display', Georgia, serif"
    font-size="17"
    font-style="italic"
    fill="#1a1208"
    text-anchor="middle">why it exists, what good</text>
  <text x="640" y="294"
    font-family="'Playfair Display', Georgia, serif"
    font-size="17"
    font-style="italic"
    fill="#1a1208"
    text-anchor="middle">looks like, and what</text>
  <text x="640" y="316"
    font-family="'Playfair Display', Georgia, serif"
    font-size="17"
    font-style="italic"
    fill="#1a1208"
    text-anchor="middle">bad looks like."</text>

  <!-- Rule below pull quote -->
  <rect x="474" y="330" width="334" height="0.6" fill="#1a1208"/>

  <!-- Story 1: PRD -->
  <text x="474" y="350"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10"
    fill="#1a1208"
    letter-spacing="2"
    font-weight="600">PRD /</text>
  <text x="640" y="350"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10"
    fill="#1a1208"
    text-anchor="end"
    letter-spacing="1">pg. 1</text>

  <text x="474" y="366"
    font-family="'Playfair Display', Georgia, serif"
    font-size="14"
    font-weight="900"
    fill="#1a1208">Lean or full. Both ship.</text>
  <text x="474" y="381"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11"
    fill="#1a1208"
    opacity="0.72">Two PRD templates, 15KB and 48KB.</text>
  <text x="474" y="395"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11"
    fill="#1a1208"
    opacity="0.72">No filler. No AI fluff.</text>

  <rect x="474" y="404" width="334" height="0.6" fill="#1a1208" opacity="0.4"/>

  <!-- Story 2: Brand Guide -->
  <text x="474" y="422"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10"
    fill="#1a1208"
    letter-spacing="2"
    font-weight="600">BRAND /</text>
  <text x="640" y="422"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10"
    fill="#1a1208"
    text-anchor="end"
    letter-spacing="1">pg. 2</text>

  <text x="474" y="438"
    font-family="'Playfair Display', Georgia, serif"
    font-size="14"
    font-weight="900"
    fill="#1a1208">Decide why, then design.</text>
  <text x="474" y="453"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11"
    fill="#1a1208"
    opacity="0.72">If you can't write why, the</text>
  <text x="474" y="467"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11"
    fill="#1a1208"
    opacity="0.72">choice isn't made yet.</text>

  <rect x="474" y="476" width="334" height="0.6" fill="#1a1208" opacity="0.4"/>

  <!-- Story 3: Sessions -->
  <text x="474" y="494"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10"
    fill="#1a1208"
    letter-spacing="2"
    font-weight="600">SESSIONS /</text>
  <text x="640" y="494"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10"
    fill="#1a1208"
    text-anchor="end"
    letter-spacing="1">pg. 3</text>

  <text x="474" y="510"
    font-family="'Playfair Display', Georgia, serif"
    font-size="14"
    font-weight="900"
    fill="#1a1208">14 sessions. One live URL.</text>
  <text x="474" y="525"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11"
    fill="#1a1208"
    opacity="0.72">Do not skip checkpoints.</text>

  <!-- ── RIGHT COLUMN: Stats + Install ── -->

  <!-- Kicker -->
  <text x="834" y="194"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10"
    fill="#1a1208"
    letter-spacing="3"
    font-weight="600">QUICKSTART</text>
  <rect x="834" y="198" width="394" height="0.6" fill="#1a1208"/>

  <!-- Install block: styled as a telegram/wire -->
  <rect x="834" y="210" width="394" height="72" fill="#1a1208" rx="0"/>
  <text x="854" y="234"
    font-family="'Courier New', Courier, monospace"
    font-size="12"
    fill="#f0e8d0"
    letter-spacing="0.5">$ npx degit v60samurai/</text>
  <text x="854" y="252"
    font-family="'Courier New', Courier, monospace"
    font-size="12"
    fill="#f0e8d0"
    letter-spacing="0.5">    builder-os my-product</text>
  <text x="854" y="270"
    font-family="'Courier New', Courier, monospace"
    font-size="12"
    fill="#f0e8d0"
    opacity="0.55"
    letter-spacing="0.5">then: open prd/lean-prd.md</text>

  <!-- Stats: newspaper-style -->
  <rect x="834" y="296" width="394" height="0.6" fill="#1a1208"/>

  <!-- 3-col stat grid inside right column -->
  <!-- Stat 1 -->
  <text x="908" y="328"
    font-family="'Playfair Display', Georgia, serif"
    font-size="42"
    font-weight="900"
    fill="#1a1208"
    text-anchor="middle">3</text>
  <text x="908" y="346"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="9"
    fill="#1a1208"
    text-anchor="middle"
    letter-spacing="1.5"
    opacity="0.7">DOCUMENTS</text>

  <!-- Vertical rule between stats -->
  <rect x="959" y="302" width="0.6" height="52" fill="#1a1208" opacity="0.3"/>

  <!-- Stat 2 -->
  <text x="1031" y="328"
    font-family="'Playfair Display', Georgia, serif"
    font-size="42"
    font-weight="900"
    fill="#1a1208"
    text-anchor="middle">14</text>
  <text x="1031" y="346"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="9"
    fill="#1a1208"
    text-anchor="middle"
    letter-spacing="1.5"
    opacity="0.7">SESSIONS</text>

  <!-- Vertical rule between stats -->
  <rect x="1082" y="302" width="0.6" height="52" fill="#1a1208" opacity="0.3"/>

  <!-- Stat 3 -->
  <text x="1155" y="328"
    font-family="'Playfair Display', Georgia, serif"
    font-size="42"
    font-weight="900"
    fill="#1a1208"
    text-anchor="middle">0</text>
  <text x="1155" y="346"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="9"
    fill="#1a1208"
    text-anchor="middle"
    letter-spacing="1.5"
    opacity="0.7">INSTALLS</text>

  <rect x="834" y="360" width="394" height="0.6" fill="#1a1208"/>

  <!-- Right col body text -->
  <text x="834" y="382"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="12.5"
    fill="#1a1208"
    opacity="0.85">Copy the templates. Fill every</text>
  <text x="834" y="398"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="12.5"
    fill="#1a1208"
    opacity="0.85">placeholder. Use the confidence</text>
  <text x="834" y="414"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="12.5"
    fill="#1a1208"
    opacity="0.85">tags honestly. A solo builder</text>
  <text x="834" y="430"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="12.5"
    fill="#1a1208"
    opacity="0.85">using this end-to-end ships</text>
  <text x="834" y="446"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="12.5"
    fill="#1a1208"
    opacity="0.85">in <tspan font-weight="600">12-16 hours</tspan> of focused work.</text>

  <rect x="834" y="458" width="394" height="0.6" fill="#1a1208" opacity="0.4"/>

  <!-- Confidence tags legend -->
  <text x="834" y="476"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="10"
    fill="#1a1208"
    letter-spacing="2"
    font-weight="600">CONFIDENCE TAGS</text>

  <text x="834" y="494"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11.5"
    fill="#1a1208"
    opacity="0.82">🟢 Primary research</text>
  <text x="1031" y="494"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11.5"
    fill="#1a1208"
    opacity="0.82">🟡 Secondary</text>

  <text x="834" y="512"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11.5"
    fill="#1a1208"
    opacity="0.82">🔵 Hypothesis</text>
  <text x="1031" y="512"
    font-family="'Source Serif 4', Georgia, serif"
    font-size="11.5"
    fill="#1a1208"
    opacity="0.82">🔴 Disproven</text>

  <rect x="834" y="522" width="394" height="0.6" fill="#1a1208" opacity="0.4"/>

  <!-- Assumes you've shipped note -->
